name: tweet

on:
  schedule:
    # 毎時20分に実行（5つの項目が必要！）
    - cron: '20 * * * *'
  workflow_dispatch: # これがあれば、手動で叩き起こすこともできる！

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run bot
        env:
          # Secretsから情報を持ってくる設定
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
        run: python bot.py
